name: Generate Snake

on:
  # roda a cada 12 horas
  schedule:
    - cron: "0 */12 * * *"
  # e sempre que houver push na main
  push:
    branches:
      - main
  # permite rodar manualmente pelo botão "Run workflow"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Generate snake.svg
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/snake.svg?palette=github-dark&color_snake=#f5b941&color_dots=#1f2530,#97c459,#639922,#3b6d11

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
